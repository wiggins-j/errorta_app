<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>App</title>
</head>
<body>
  <div id="root"></div>
  <script>
    // Simulated SPA bootstrap. All real content arrives via XHR after mount,
    // so a server-side HTML fetch sees almost no visible text. This is the
    // exact failure mode the JS-only detector exists to surface.
    window.__APP__ = { boot: true };
  </script>
</body>
</html>
